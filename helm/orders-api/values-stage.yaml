# Stage overrides: production-shaped. HA, autoscaling headroom, no debug hooks.
environment: stage

replicaCount: 3

resources:
  requests:
    cpu: 100m
    memory: 96Mi
  limits:
    cpu: 500m
    memory: 192Mi

config:
  warmup: "5s"
  debugEndpoints: false    # never expose fault injection in stage

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

pdb:
  enabled: true
  minAvailable: 2

topologySpreadConstraints:
  enabled: true

metrics:
  serviceMonitor:
    interval: 15s
