apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orders-api.fullname" . }}-config
  labels:
    {{- include "orders-api.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.containerPort | quote }}
  WARMUP: {{ .Values.config.warmup | quote }}
  DEBUG_ENDPOINTS: {{ .Values.config.debugEndpoints | quote }}
  ENVIRONMENT: {{ .Values.environment | quote }}
